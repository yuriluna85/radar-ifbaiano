<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar IF Baiano - Monitor DICOM</title>
    <style>
        :root { --verde: #32a041; --vermelho: #c8191e; --bg: #0f172a; --card: #1e293b; --txt: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; }
        
        header { text-align: center; margin-bottom: 10px; }
        h1 { color: var(--verde); font-size: 1.6rem; margin: 0; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        
        .progress-container { width: 100%; height: 6px; background: #334155; margin-top: 15px; border-radius: 10px; overflow: hidden; }
        #bar-fill { width: 100%; height: 100%; background: var(--verde); transition: width 1s linear; }
        
        #status-console { 
            font-family: 'Courier New', monospace; font-size: 0.7rem; color: #10b981; 
            background: #000; padding: 12px; border-radius: 8px; 
            max-width: 850px; margin: 15px auto; border: 1px solid #334155;
            min-height: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .filters { max-width: 950px; margin: 15px auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .btn-filter { 
            background: #334155; border: none; color: #94a3b8; padding: 6px 12px; 
            border-radius: 15px; cursor: pointer; font-size: 0.65rem; font-weight: 700; transition: 0.3s;
        }
        .btn-filter.active, .btn-filter:hover { background: var(--verde); color: #fff; }

        #news-container { max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

        .card {
            display: flex; background: var(--card); border-radius: 12px; overflow: hidden;
            text-decoration: none; color: inherit; height: 130px; border-left: 6px solid var(--verde);
            margin-bottom: -15px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); position: relative; animation: fadeIn 0.6s ease forwards;
        }
        .card:hover { transform: translateY(-10px); z-index: 10; border-left-color: var(--vermelho); background: #334155; }

        .img-box { position: relative; width: 240px; min-width: 240px; height: 100%; background: #000; }
        .img-src { width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.85; }
        .badge { position: absolute; top: 0; left: 0; background: var(--verde); color: #fff; font-size: 0.65rem; font-weight: 900; padding: 5px 12px; border-bottom-right-radius: 12px; text-transform: uppercase; }

        .pulse { position: absolute; top: 12px; right: 12px; width: 12px; height: 12px; background: var(--vermelho); border-radius: 50%; z-index: 20; animation: pulseEffect 1.5s infinite; }
        @keyframes pulseEffect { 0% { box-shadow: 0 0 0 0 rgba(200, 25, 30, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(200, 25, 30, 0); } 100% { box-shadow: 0 0 0 0 rgba(200, 25, 30, 0); } }

        .info { padding: 15px 25px; display: flex; flex-direction: column; justify-content: center; }
        .title { margin: 0; font-size: 1rem; line-height: 1.3; font-weight: 600; color: #fff; }
        .date { font-size: 0.65rem; color: #94a3b8; margin-top: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
        @media (max-width: 700px) { .card { height: auto; flex-direction: column; margin-bottom: 20px; } .img-box { width: 100%; height: 160px; } }
    </style>
</head>
<body>

<header>
    <h1>📡 Radar IF Baiano - DICOM</h1>
    <div class="progress-container"><div id="bar-fill"></div></div>
    <div id="status-console">> Sistema pronto. Sincronizando Giro pelos 14 Campi...</div>
</header>

<div class="filters" id="filters">
    <button class="btn-filter active" onclick="filterByCampus('Todos', this)">Todos</button>
</div>

<div id="news-container">
    <p style="text-align:center; padding: 50px; opacity: 0.5;">Iniciando primeira varredura do dia...</p>
</div>

<script>
    const UNIDADES = [
        { id: "Reitoria", url: "https://ifbaiano.edu.br/portal/wp-json/wp/v2/posts" },
        { id: "Alagoinhas", url: "https://www.ifbaiano.edu.br/unidades/alagoinhas/wp-json/wp/v2/posts" },
        { id: "Lapa", url: "https://www.ifbaiano.edu.br/unidades/lapa/wp-json/wp/v2/posts" },
        { id: "Catu", url: "https://www.ifbaiano.edu.br/unidades/catu/wp-json/wp/v2/posts" },
        { id: "Mangabeira", url: "https://www.ifbaiano.edu.br/unidades/gmb/wp-json/wp/v2/posts" },
        { id: "Guanambi", url: "https://www.ifbaiano.edu.br/unidades/guanambi/wp-json/wp/v2/posts" },
        { id: "Itaberaba", url: "https://www.ifbaiano.edu.br/unidades/itaberaba/wp-json/wp/v2/posts" },
        { id: "Itapetinga", url: "https://www.ifbaiano.edu.br/unidades/itapetinga/wp-json/wp/v2/posts" },
        { id: "Santa Inês", url: "https://www.ifbaiano.edu.br/unidades/santaines/wp-json/wp/v2/posts" },
        { id: "Bonfim", url: "https://www.ifbaiano.edu.br/unidades/bonfim/wp-json/wp/v2/posts" },
        { id: "Serrinha", url: "https://www.ifbaiano.edu.br/unidades/serrinha/wp-json/wp/v2/posts" },
        { id: "Teixeira", url: "https://www.ifbaiano.edu.br/unidades/teixiera/wp-json/wp/v2/posts" },
        { id: "Uruçuca", url: "https://www.ifbaiano.edu.br/unidades/urucuca/wp-json/wp/v2/posts" },
        { id: "Valença", url: "https://www.ifbaiano.edu.br/unidades/valenca/wp-json/wp/v2/posts" }
          { id: "Valença", url: "https://www.ifbaiano.edu.br/unidades/xique-xique/wp-json/wp/v2/posts" }
    ];

    let timer = 120;
    let dataStore = []; // Memória persistente do Radar
    let isInitialLoad = true;
    const proxy = "https://api.allorigins.win/get?url=";
    const consoleLog = document.getElementById('status-console');

    // Botões de filtro
    UNIDADES.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'btn-filter'; btn.innerText = u.id;
        btn.onclick = (e) => filterByCampus(u.id, e.target);
        document.getElementById('filters').appendChild(btn);
    });

    setInterval(() => {
        timer--;
        document.getElementById('bar-fill').style.width = (timer / 120 * 100) + "%";
        if (timer <= 0) { 
            timer = 120; 
            giroCompleto(); 
        }
    }, 1000);

    async function giroCompleto() {
        consoleLog.innerText = isInitialLoad ? "> Sincronizando Giro pelos 14 Campi..." : "> Verificando novas publicações...";
        let tempBatch = [];

        for (const unidade of UNIDADES) {
            consoleLog.innerText = `> Consultando: ${unidade.id}...`;
            try {
                const response = await fetch(`${proxy}${encodeURIComponent(unidade.url)}&_t=${Date.now()}`);
                const wrapper = await response.json();
                const posts = JSON.parse(wrapper.contents);

                if (posts && posts.length > 0) {
                    const post = posts[0];
                    const pDate = new Date(post.date);
                    
                    let img = `https://picsum.photos/seed/${unidade.id}/400/220`;
                    const imgMatch = post.content.rendered.match(/src="([^"]+)"/);
                    if (imgMatch) img = imgMatch[1];

                    tempBatch.push({
                        title: post.title.rendered.replace(/&#8211;/g, '-').replace(/&nbsp;/g, ' ').replace(/&#8220;/g, '"').replace(/&#8221;/g, '"'),
                        link: post.link,
                        date: pDate,
                        campus: unidade.id,
                        img: img,
                        hot: (Date.now() - pDate.getTime()) < 3600000
                    });
                }
            } catch (e) { 
                // Se falhar a busca atual, tenta manter o que já tínhamos dessa unidade no dataStore
                const existing = dataStore.find(n => n.campus === unidade.id);
                if (existing) tempBatch.push(existing);
                consoleLog.innerText = `> ${unidade.id}: Mantendo versão anterior (Falha de rede).`;
            }
            await new Promise(r => setTimeout(r, 200));
        }

        // Só atualizamos se conseguimos captar alguma notícia
        if (tempBatch.length > 0) {
            dataStore = tempBatch.sort((a, b) => b.date - a.date);
            render(dataStore);
            isInitialLoad = false;
        }

        consoleLog.innerText = `> Radar Atualizado: ${dataStore.length} unidades em exibição.`;
    }

    function filterByCampus(id, btn) {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(id === 'Todos' ? dataStore : dataStore.filter(n => n.campus === id));
    }

    function render(list) {
        const container = document.getElementById('news-container');
        // Se for a carga inicial e não tivermos nada, mostra o erro. 
        // Se for atualização, o render simplesmente sobrescreve o antigo.
        if (list.length === 0 && isInitialLoad) {
            container.innerHTML = "<p style='text-align:center; padding:50px; opacity:0.5;'>Erro na carga inicial. Tentando novamente...</p>";
            return;
        }

        container.innerHTML = list.map(n => `
            <a href="${n.link}" target="_blank" class="card">
                ${n.hot ? '<div class="pulse"></div>' : ''}
                <div class="img-box">
                    <div class="img-src" style="background-image: url('${n.img}')"></div>
                    <div class="badge">${n.campus}</div>
                </div>
                <div class="info">
                    <h2 class="title">${n.title}</h2>
                    <div class="date">${n.date.toLocaleDateString('pt-BR')} às ${n.date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            </a>`).join('');
    }

    giroCompleto();
</script>
</body>
</html>
