<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar IF Baiano - Monitor DICOM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { 
            --if-verde: #009639; 
            --if-vermelho: #C8102E; 
            --if-preto: #000000;
            --if-branco: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.95);
            --txt-primario: #333333;
            --txt-secundario: #666666;
        }
        
        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(-45deg, #ffffff, #f2f2f2, #f9fff9, #ffffff);
            background-size: 400% 400%;
            animation: meshGradient 25s ease infinite;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        
        header { 
            background: var(--if-branco); 
            padding: 15px 35px; border-radius: 0 0 20px 20px; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            border-bottom: 8px solid var(--if-verde);
            margin-bottom: 25px;
            display: flex; align-items: center; position: relative;
        }
        
        .header-left { display: flex; align-items: center; margin: 0 auto; }
        .logo-if { height: 100px; width: auto; }
        h1 { color: var(--if-preto); font-size: 1.8rem; margin: 0; font-weight: 800; text-transform: uppercase; margin-left: 25px; }
        
        .header-right { 
            text-align: right; border-left: 2px solid #ddd; padding-left: 25px; 
            position: absolute; right: 35px; 
        }
        #clock { font-size: 2.2rem; font-weight: 900; color: var(--if-preto); line-height: 1; }
        #date-top { font-size: 0.9rem; color: var(--if-verde); font-weight: 700; text-transform: uppercase; }

        .main-content { padding: 0 20px 120px 20px; flex: 1; }

        .progress-container { max-width: 1200px; margin: 0 auto 15px auto; height: 10px; background: #E0E0E0; border-radius: 20px; overflow: hidden; }
        #bar-fill { width: 100%; height: 100%; background: var(--if-verde); transition: width 1s linear; }
        
        #status-console { 
            font-family: 'Courier New', monospace; font-size: 0.85rem; color: #10b981; 
            background: #1a1a1a; padding: 12px; border-radius: 10px; 
            max-width: 1200px; margin: 0 auto 20px auto; border: 1px solid #333;
        }

        .filters { max-width: 1200px; margin: 20px auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .btn-filter { background: #E0E0E0; border: none; color: var(--txt-primario); padding: 8px 16px; border-radius: 25px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: 0.3s; }
        .btn-filter.active, .btn-filter:hover { background: var(--if-verde); color: var(--if-branco); transform: scale(1.05); }

        #news-container { max-width: 1550px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 1024px) { #news-container { grid-template-columns: 1fr 1fr; } .featured { grid-column: 1 / span 2; } }

        .card { display: flex; background: var(--card-bg); border-radius: 20px; overflow: hidden; text-decoration: none; color: inherit; height: 210px; border-left: 12px solid var(--if-verde); transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.06); position: relative; }
        .card.featured { height: 260px; border-left-width: 20px; background: #fff; }

        .img-box { position: relative; width: 35%; min-width: 220px; height: 100%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-src { width: 100%; height: 100%; background-size: cover; background-position: center; }
        .img-src.fallback { background-size: contain; background-repeat: no-repeat; width: 85%; height: 85%; }
        
        .badge { position: absolute; top: 0; left: 0; background: var(--if-verde); color: var(--if-branco); font-size: 0.8rem; font-weight: 900; padding: 10px 15px; border-bottom-right-radius: 20px; text-transform: uppercase; z-index: 10; }

        .info { padding: 25px; display: flex; flex-direction: column; justify-content: center; width: 65%; }
        .title { margin: 0; font-size: 1.4rem; line-height: 1.2; font-weight: 800; color: var(--if-preto); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .date { font-size: 1rem; color: var(--txt-secundario); margin-top: 15px; font-weight: 700; text-transform: uppercase; }

        footer {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            position: fixed;
            bottom: 0; width: 100%;
            display: flex; justify-content: center;
            border-top: 4px solid var(--if-verde);
            z-index: 1000;
        }

        .btn-pdf { 
            background: var(--if-preto); color: white; border: none; 
            padding: 12px 30px; border-radius: 30px; cursor: pointer; 
            font-size: 0.9rem; font-weight: 800; transition: 0.3s; 
            display: flex; align-items: center; gap: 10px;
        }
        .btn-pdf:hover { background: var(--if-vermelho); transform: translateY(-3px); }

        @media (max-width: 800px) { header { flex-direction: column; text-align: center; } .header-right { position: static; border: none; padding: 0; margin-top: 10px; } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img id="logo-img" src="https://github.com/yuriluna85/radar-ifbaiano/blob/main/marca-if-baiano-vertical.png?raw=true" alt="Logo IF Baiano" class="logo-if">
        <h1>Radar de Notícias - DICOM</h1>
    </div>
    <div class="header-right">
        <div id="date-top">-- de -- de ----</div>
        <div id="clock">00:00:00</div>
    </div>
</header>

<div class="main-content">
    <div class="progress-container"><div id="bar-fill"></div></div>
    <div id="status-console">> Painel DICOM v47.0 Online.</div>

    <div class="filters" id="filters">
        <button id="btn-todos" class="btn-filter active" onclick="filterByCampus('Todos', this)">Todos (Destaques)</button>
    </div>

    <div id="news-container"></div>
</div>

<footer>
    <button class="btn-pdf" onclick="gerarRelatorioPDF()">
        <span>📄</span> Gerar Relatório PDF (<span id="pdf-context">Geral</span>)
    </button>
</footer>

<script>
    const LOGO_VERTICAL = "https://github.com/yuriluna85/radar-ifbaiano/blob/main/marca-if-baiano-vertical.png?raw=true";
    
    const UNIDADES = [
        { id: "Reitoria", url: "https://www.ifbaiano.edu.br/portal/wp-json/wp/v2/posts/" },
        { id: "Alagoinhas", url: "https://www.ifbaiano.edu.br/unidades/alagoinhas/wp-json/wp/v2/posts/" },
        { id: "Lapa", url: "https://www.ifbaiano.edu.br/unidades/lapa/wp-json/wp/v2/posts/" },
        { id: "Catu", url: "https://www.ifbaiano.edu.br/unidades/catu/wp-json/wp/v2/posts/" },
        { id: "Mangabeira", url: "https://www.ifbaiano.edu.br/unidades/gmb/wp-json/wp/v2/posts/" }, // Corrigido para /gmb/
        { id: "Guanambi", url: "https://www.ifbaiano.edu.br/unidades/guanambi/wp-json/wp/v2/posts/" },
        { id: "Itaberaba", url: "https://www.ifbaiano.edu.br/unidades/itaberaba/wp-json/wp/v2/posts/" },
        { id: "Itapetinga", url: "https://www.ifbaiano.edu.br/unidades/itapetinga/wp-json/wp/v2/posts/" },
        { id: "Santa Inês", url: "https://www.ifbaiano.edu.br/unidades/santaines/wp-json/wp/v2/posts/" },
        { id: "Bonfim", url: "https://www.ifbaiano.edu.br/unidades/bonfim/wp-json/wp/v2/posts/" },
        { id: "Serrinha", url: "https://www.ifbaiano.edu.br/unidades/serrinha/wp-json/wp/v2/posts/" },
        { id: "Teixeira", url: "https://www.ifbaiano.edu.br/unidades/teixeira/wp-json/wp/v2/posts/" },
        { id: "Uruçuca", url: "https://www.ifbaiano.edu.br/unidades/urucuca/wp-json/wp/v2/posts/" },
        { id: "Valença", url: "https://www.ifbaiano.edu.br/unidades/valenca/wp-json/wp/v2/posts/" },
        { id: "Xique-Xique", url: "https://www.ifbaiano.edu.br/unidades/xique-xique/wp-json/wp/v2/posts/" }
    ];

    let timer = 120;
    let dataStore = [];
    let currentFilter = 'Todos';
    const consoleLog = document.getElementById('status-console');

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
        document.getElementById('date-top').innerText = now.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
    }
    setInterval(updateClock, 1000); updateClock();

    UNIDADES.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'btn-filter'; btn.innerText = u.id;
        btn.onclick = (e) => filterByCampus(u.id, e.target);
        document.getElementById('filters').appendChild(btn);
    });

    setInterval(() => {
        timer--;
        document.getElementById('bar-fill').style.width = (timer / 120 * 100) + "%";
        if (timer <= 0) { timer = 120; giroCompleto(); }
    }, 1000);

    async function giroCompleto() {
        consoleLog.innerText = "> Sincronizando notícias...";
        let tempBatch = [];
        for (const unidade of UNIDADES) {
            try {
                const response = await fetch(`${unidade.url}?per_page=5&_embed&_t=${Date.now()}`);
                const posts = await response.json();
                if (posts && Array.isArray(posts)) {
                    posts.forEach(post => {
                        let img = LOGO_VERTICAL;
                        let imgStatus = "Fallback (Logo)";
                        if (post._embedded && post._embedded['wp:featuredmedia']) {
                            img = post._embedded['wp:featuredmedia'][0].source_url;
                            imgStatus = "Destaque Oficial";
                        } else {
                            const imgMatch = post.content.rendered.match(/src="([^"]+)"/);
                            if (imgMatch) { img = imgMatch[1]; imgStatus = "Interna (Corpo)"; }
                        }
                        tempBatch.push({
                            title: post.title.rendered.replace(/&#8211;/g, '-').replace(/&nbsp;/g, ' ').replace(/&#8220;/g, '"').replace(/&#8221;/g, '"'),
                            link: post.link,
                            date: new Date(post.date),
                            campus: unidade.id,
                            img: img,
                            imgStatus: imgStatus,
                            isFallback: imgStatus === "Fallback (Logo)"
                        });
                    });
                }
            } catch (e) { 
                tempBatch = tempBatch.concat(dataStore.filter(n => n.campus === unidade.id));
            }
        }
        dataStore = tempBatch;
        render(dataStore);
        consoleLog.innerText = `> Monitor Online. Última sincronização: ${new Date().toLocaleTimeString('pt-BR')}`;
    }

    function filterByCampus(id, btn) {
        currentFilter = id;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('pdf-context').innerText = (id === 'Todos') ? 'Geral' : id;
        render(dataStore);
    }

    function render(list) {
        const container = document.getElementById('news-container');
        let displayList = [];
        if (currentFilter === 'Todos') {
            const latestMap = new Map();
            list.forEach(item => { if (!latestMap.has(item.campus) || item.date > latestMap.get(item.campus).date) latestMap.set(item.campus, item); });
            displayList = Array.from(latestMap.values()).sort((a, b) => b.date - a.date);
            const idxR = displayList.findIndex(n => n.campus === 'Reitoria');
            if (idxR > -1) { const r = displayList.splice(idxR, 1)[0]; displayList.unshift(r); }
        } else {
            displayList = list.filter(n => n.campus === currentFilter).sort((a, b) => b.date - a.date).slice(0, 5);
        }
        if (displayList.length === 0) return;
        container.innerHTML = displayList.map((n, index) => `
            <a href="${n.link}" target="_blank" class="card ${(index === 0) ? 'featured' : ''}">
                <div class="img-box">
                    <div class="img-src ${n.isFallback ? 'fallback' : ''}" style="background-image: url('${n.img}')"></div>
                    <div class="badge">${n.campus}</div>
                </div>
                <div class="info">
                    <h2 class="title">${n.title}</h2>
                    <div class="date">${n.date.toLocaleDateString('pt-BR')} | ${n.date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            </a>`).join('');
    }

    function getBase64ImageFromUrl(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.setAttribute("crossOrigin", "anonymous");
            img.onload = () => {
                const canvas = document.createElement("canvas");
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);
                resolve(canvas.toDataURL("image/png"));
            };
            img.onerror = (error) => reject(error);
            img.src = url;
        });
    }

    async function gerarRelatorioPDF() {
        if (!window.jspdf || !window.jspdf.jsPDF) { alert("Sistema de PDF carregando..."); return; }
        if (dataStore.length === 0) { alert("Sincronize as notícias primeiro."); return; }

        consoleLog.innerText = "> Preparando relatório institucional...";
        
        const doc = new jspdf.jsPDF('p', 'mm', 'a4');
        const now = new Date();
        const dataStr = now.toLocaleDateString('pt-BR');
        
        let reportData = (currentFilter === 'Todos') 
            ? dataStore.sort((a,b) => b.date - a.date) 
            : dataStore.filter(n => n.campus === currentFilter).sort((a,b) => b.date - a.date);
        
        let reportTitle = (currentFilter === 'Todos') ? "Geral" : currentFilter;

        try {
            const logoBase64 = await getBase64ImageFromUrl(LOGO_VERTICAL);
            doc.addImage(logoBase64, 'PNG', 10, 10, 30, 40);
        } catch (e) {
            console.warn("Logo ignorada no PDF.");
        }

        doc.setFont("helvetica", "bold"); doc.setFontSize(16);
        doc.text(`Relatório de Monitoramento - ${reportTitle}`, 45, 25);
        doc.setFontSize(10); doc.setFont("helvetica", "normal");
        doc.text(`DICOM | Gerado em: ${dataStr} às ${now.toLocaleTimeString('pt-BR')}`, 45, 32);
        doc.line(10, 55, 200, 55);

        // MODIFICAÇÃO: Inserção da URL abaixo do Título na Tabela
        const rows = reportData.map(n => [
            n.date.toLocaleDateString('pt-BR') + " " + n.date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            n.campus, 
            n.title + "\n\nURL: " + n.link, // URL adicionada aqui com quebra de linha
            n.imgStatus
        ]);

        doc.autoTable({
            startY: 60,
            head: [['Data/Hora', 'Campus', 'Título e Link da Notícia', 'Status Imagem']],
            body: rows,
            headStyles: { fillColor: [0, 150, 57] },
            styles: { fontSize: 8, cellPadding: 4 }, // Padding maior para caber o link
            columnStyles: { 2: { cellWidth: 90 } } // Largura aumentada para o texto longo
        });

        doc.save(`Relatorio_Radar_${reportTitle.replace(/ /g, '_')}_${dataStr.replace(/\//g, '-')}.pdf`);
        consoleLog.innerText = "> Relatório gerado com sucesso.";
    }

    giroCompleto();
</script>
</body>
</html>
