<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar IF Baiano - Monitor DICOM</title>
    <style>
        :root { --verde: #32a041; --vermelho: #c8191e; --bg: #0f172a; --card: #1e293b; --txt: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--verde); font-size: 1.7rem; margin: 0; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        
        /* Filtros */
        .filter-wrap { max-width: 950px; margin: 20px auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .btn-f { background: #334155; border: none; color: #94a3b8; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 0.65rem; font-weight: 700; transition: 0.3s; }
        .btn-f.active, .btn-f:hover { background: var(--verde); color: #fff; }

        /* Progresso */
        .progress { width: 100%; height: 6px; background: #334155; margin-top: 15px; border-radius: 10px; overflow: hidden; }
        #bar { width: 100%; height: 100%; background: var(--verde); transition: width 1s linear; }
        #status { font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 10px; font-weight: bold; }

        #news-container { max-width: 850px; margin: 20px auto; display: flex; flex-direction: column; gap: 15px; }

        /* Card Layout */
        .card {
            display: flex; background: var(--card); border-radius: 12px; overflow: hidden;
            text-decoration: none; color: inherit; height: 130px; border-left: 6px solid var(--verde);
            margin-bottom: -15px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); position: relative; animation: slideIn 0.5s ease forwards;
        }
        .card:hover { transform: translateY(-10px) scale(1.02); z-index: 10; border-left-color: var(--vermelho); background: #334155; }

        .img-box { position: relative; width: 240px; min-width: 240px; height: 100%; background: #000; }
        .img-src { width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.8; }
        .badge { position: absolute; top: 0; left: 0; background: var(--verde); color: #fff; font-size: 0.65rem; font-weight: 900; padding: 6px 12px; border-bottom-right-radius: 12px; }

        /* Ponto Pulsante (<1h) */
        .pulse {
            position: absolute; top: 12px; right: 12px; width: 12px; height: 12px;
            background: var(--vermelho); border-radius: 50%; z-index: 20;
            box-shadow: 0 0 0 rgba(200, 25, 30, 0.4); animation: pulseAnim 1.5s infinite;
        }
        @keyframes pulseAnim {
            0% { box-shadow: 0 0 0 0 rgba(200, 25, 30, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(200, 25, 30, 0); }
            100% { box-shadow: 0 0 0 0 rgba(200, 25, 30, 0); }
        }

        .info { padding: 15px 25px; display: flex; flex-direction: column; justify-content: center; }
        .title { margin: 0; font-size: 1rem; line-height: 1.3; font-weight: 600; color: #fff; }
        .date { font-size: 0.65rem; color: #94a3b8; margin-top: 8px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; } }
        @media (max-width: 650px) { .card { height: auto; flex-direction: column; margin-bottom: 20px; } .img-box { width: 100%; height: 150px; } }
    </style>
</head>
<body>

<header>
    <h1>📡 Radar IF Baiano</h1>
    <div class="progress"><div id="bar"></div></div>
    <p id="status">Sincronizando Giro pelos 14 Campi...</p>
</header>

<div class="filter-wrap" id="filter-bar">
    <button class="btn-f active" onclick="filterNews('Todos', this)">Todos</button>
</div>

<div id="news-container">
    <p style="text-align:center; padding: 40px; opacity: 0.5;">Aguardando sinal das unidades...</p>
</div>

<script>
    const CAMPI = [
        { id: "Reitoria", url: "https://ifbaiano.edu.br/portal/noticias/feed/" },
        { id: "Alagoinhas", url: "https://ifbaiano.edu.br/portal/campi/alagoinhas/feed/" },
        { id: "Lapa", url: "https://ifbaiano.edu.br/portal/campi/lapa/feed/" },
        { id: "Catu", url: "https://ifbaiano.edu.br/portal/campi/catu/feed/" },
        { id: "Mangabeira", url: "https://ifbaiano.edu.br/portal/campi/mangabeira/feed/" },
        { id: "Guanambi", url: "https://ifbaiano.edu.br/portal/campi/guanambi/feed/" },
        { id: "Itaberaba", url: "https://ifbaiano.edu.br/portal/campi/itaberaba/feed/" },
        { id: "Itapetinga", url: "https://ifbaiano.edu.br/portal/campi/itapetinga/feed/" },
        { id: "Santa Inês", url: "https://ifbaiano.edu.br/portal/campi/santa-ines/feed/" },
        { id: "Bonfim", url: "https://ifbaiano.edu.br/portal/campi/bonfim/feed/" },
        { id: "Serrinha", url: "https://ifbaiano.edu.br/portal/campi/serrinha/feed/" },
        { id: "Teixeira", url: "https://ifbaiano.edu.br/portal/campi/teixeira/feed/" },
        { id: "Uruçuca", url: "https://ifbaiano.edu.br/portal/campi/urucuca/feed/" },
        { id: "Valença", url: "https://ifbaiano.edu.br/portal/campi/valenca/feed/" }
    ];

    let timer = 120;
    let dataCache = [];

    // Botões
    CAMPI.forEach(c => {
        const b = document.createElement('button');
        b.className = 'btn-f'; b.innerText = c.id;
        b.onclick = (e) => filterNews(c.id, e.target);
        document.getElementById('filter-bar').appendChild(b);
    });

    setInterval(() => {
        timer--;
        document.getElementById('bar').style.width = (timer / 120 * 100) + "%";
        if (timer <= 0) { timer = 120; fetchAll(); }
    }, 1000);

    async function fetchAll() {
        document.getElementById('status').innerText = "🔄 Sincronizando Giro pelos 14 Campi...";
        let temp = [];

        const promises = CAMPI.map(async (campus) => {
            try {
                // Usando AllOrigins via fetch
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(campus.url)}&_t=${Date.now()}`);
                const json = await res.json();
                
                const parser = new DOMParser();
                const xml = parser.parseFromString(json.contents, "text/xml");
                const item = xml.querySelector("item");

                if (item) {
                    const pubDate = new Date(item.querySelector("pubDate").textContent);
                    const desc = item.querySelector("description")?.textContent || "";
                    const imgMatch = desc.match(/src="([^"]+)"/);

                    return {
                        title: item.querySelector("title").textContent,
                        link: item.querySelector("link").textContent,
                        date: pubDate,
                        campus: campus.id,
                        img: imgMatch ? imgMatch[1] : `https://picsum.photos/seed/${campus.id}/400/225`,
                        hot: (Date.now() - pubDate.getTime()) < 3600000
                    };
                }
            } catch (e) { return null; }
        });

        const results = await Promise.all(promises);
        dataCache = results.filter(n => n !== null).sort((a, b) => b.date - a.date);
        render(dataCache);
        document.getElementById('status').innerText = "✅ Monitoramento Ativo (GitHub Cloud)";
    }

    function filterNews(id, btn) {
        document.querySelectorAll('.btn-f').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(id === 'Todos' ? dataCache : dataCache.filter(n => n.campus === id));
    }

    function render(list) {
        const container = document.getElementById('news-container');
        container.innerHTML = list.map(n => `
            <a href="${n.link}" target="_blank" class="card">
                ${n.hot ? '<div class="pulse"></div>' : ''}
                <div class="img-box">
                    <div class="img-src" style="background-image: url('${n.img}')"></div>
                    <div class="badge">${n.campus}</div>
                </div>
                <div class="info">
                    <h2 class="title">${n.title}</h2>
                    <div class="date">${n.date.toLocaleDateString()} às ${n.date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            </a>`).join('');
    }

    fetchAll();
</script>
</body>
</html>
