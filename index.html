<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar IF Baiano - Monitor DICOM</title>
    <style>
        :root { --verde: #32a041; --vermelho: #c8191e; --bg: #0f172a; --card: #1e293b; --txt: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; }
        
        header { text-align: center; margin-bottom: 10px; }
        h1 { color: var(--verde); font-size: 1.5rem; margin: 0; font-weight: 800; text-transform: uppercase; }
        
        .progress-box { width: 100%; height: 5px; background: #334155; margin-top: 15px; border-radius: 10px; overflow: hidden; }
        #fill { width: 100%; height: 100%; background: var(--verde); transition: width 1s linear; }
        #status-log { font-family: monospace; font-size: 0.65rem; color: #10b981; text-align: center; margin-top: 10px; height: 1.2em; }

        .filters { max-width: 950px; margin: 15px auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        .f-btn { background: #334155; border: none; color: #94a3b8; padding: 5px 10px; border-radius: 15px; cursor: pointer; font-size: 0.65rem; font-weight: 700; transition: 0.2s; }
        .f-btn.active { background: var(--verde); color: #fff; }

        #news-container { max-width: 850px; margin: 20px auto; display: flex; flex-direction: column; gap: 12px; min-height: 200px; }

        .card {
            display: flex; background: var(--card); border-radius: 12px; overflow: hidden;
            text-decoration: none; color: inherit; height: 125px; border-left: 6px solid var(--verde);
            margin-bottom: -15px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            position: relative; animation: slideIn 0.5s ease forwards;
        }
        .card:hover { transform: translateY(-8px); z-index: 10; border-left-color: var(--vermelho); background: #334155; }

        .img-box { position: relative; width: 230px; min-width: 230px; height: 100%; background: #000; }
        .img-src { width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.8; }
        .badge { position: absolute; top: 0; left: 0; background: var(--verde); color: #fff; font-size: 0.65rem; font-weight: 900; padding: 4px 10px; border-bottom-right-radius: 10px; }

        .pulse { position: absolute; top: 12px; right: 12px; width: 10px; height: 10px; background: var(--vermelho); border-radius: 50%; z-index: 20; animation: p 1.5s infinite; }
        @keyframes p { 0% { box-shadow: 0 0 0 0 rgba(200, 25, 30, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(200, 25, 30, 0); } 100% { box-shadow: 0 0 0 0 rgba(200, 25, 30, 0); } }

        .info { padding: 15px; display: flex; flex-direction: column; justify-content: center; }
        .title { margin: 0; font-size: 0.95rem; line-height: 1.3; font-weight: 600; color: #fff; }
        .date { font-size: 0.65rem; color: #94a3b8; margin-top: 5px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; } }
        @media (max-width: 600px) { .card { height: auto; flex-direction: column; margin-bottom: 20px; } .img-box { width: 100%; height: 140px; } }
    </style>
</head>
<body>

<header>
    <h1>📡 Radar IF Baiano</h1>
    <div class="progress-box"><div id="fill"></div></div>
    <div id="status-log">> Aguardando inicialização...</div>
</header>

<div class="filters" id="filters">
    <button class="f-btn active" onclick="filter('Todos', this)">Todos</button>
</div>

<div id="news-container">
    <p style="text-align:center; padding: 50px; opacity: 0.5;">Sincronizando Giro pelos 14 Campi...</p>
</div>

<script>
    const CAMPI = [
        { id: "Reitoria", url: "https://ifbaiano.edu.br/portal/noticias/feed/" },
        { id: "Alagoinhas", url: "https://ifbaiano.edu.br/portal/campi/alagoinhas/feed/" },
        { id: "Lapa", url: "https://ifbaiano.edu.br/portal/campi/lapa/feed/" },
        { id: "Catu", url: "https://ifbaiano.edu.br/portal/campi/catu/feed/" },
        { id: "Mangabeira", url: "https://ifbaiano.edu.br/portal/campi/mangabeira/feed/" },
        { id: "Guanambi", url: "https://ifbaiano.edu.br/portal/campi/guanambi/feed/" },
        { id: "Itaberaba", url: "https://ifbaiano.edu.br/portal/campi/itaberaba/feed/" },
        { id: "Itapetinga", url: "https://ifbaiano.edu.br/portal/campi/itapetinga/feed/" },
        { id: "Santa Inês", url: "https://ifbaiano.edu.br/portal/campi/santa-ines/feed/" },
        { id: "Bonfim", url: "https://ifbaiano.edu.br/portal/campi/bonfim/feed/" },
        { id: "Serrinha", url: "https://ifbaiano.edu.br/portal/campi/serrinha/feed/" },
        { id: "Teixeira", url: "https://ifbaiano.edu.br/portal/campi/teixeira/feed/" },
        { id: "Uruçuca", url: "https://ifbaiano.edu.br/portal/campi/urucuca/feed/" },
        { id: "Valença", url: "https://ifbaiano.edu.br/portal/campi/valenca/feed/" }
    ];

    let timer = 120;
    let dataCache = [];
    const log = document.getElementById('status-log');

    // Botões de filtro
    CAMPI.forEach(c => {
        const b = document.createElement('button');
        b.className = 'f-btn'; b.innerText = c.id;
        b.onclick = (e) => filter(c.id, e.target);
        document.getElementById('filters').appendChild(b);
    });

    setInterval(() => {
        timer--;
        document.getElementById('fill').style.width = (timer / 120 * 100) + "%";
        if (timer <= 0) { timer = 120; fetchAll(); }
    }, 1000);

    async function fetchAll() {
        let collected = [];
        log.innerText = "> Iniciando varredura DICOM...";

        for (const campus of CAMPI) {
            log.innerText = `> Conectando: ${campus.id}...`;
            try {
                // AllOrigins retorna o XML bruto dentro de 'contents'
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(campus.url)}&_t=${Date.now()}`);
                const data = await res.json();
                
                // Parsing do XML via DOMParser (Nativo do Navegador)
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const item = xml.querySelector("item");

                if (item) {
                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    const pubDate = new Date(item.querySelector("pubDate").textContent);
                    const desc = item.querySelector("description")?.textContent || "";
                    
                    // Caça imagem no XML
                    const imgMatch = desc.match(/src="([^"]+)"/);
                    const img = imgMatch ? imgMatch[1] : `https://picsum.photos/seed/${campus.id}/400/220`;

                    collected.push({
                        title: title,
                        link: link,
                        date: pubDate,
                        campus: campus.id,
                        img: img,
                        hot: (Date.now() - pubDate.getTime()) < 3600000
                    });
                    log.innerText = `> ${campus.id}: Sincronizado.`;
                }
            } catch (e) { 
                log.innerText = `> ${campus.id}: Falha de rede.`;
                console.error("Erro no campus " + campus.id, e);
            }
        }

        dataCache = collected.sort((a, b) => b.date - a.date);
        render(dataCache);
        log.innerText = `> Radar Ativo: ${dataCache.length}/14 unidades online.`;
    }

    function filter(id, btn) {
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(id === 'Todos' ? dataCache : dataCache.filter(n => n.campus === id));
    }

    function render(list) {
        const container = document.getElementById('news-container');
        if (list.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:50px; opacity:0.5;'>Ocorreu um erro ao carregar os dados. Verifique sua conexão.</p>";
            return;
        }
        container.innerHTML = list.map(n => `
            <a href="${n.link}" target="_blank" class="card">
                ${n.hot ? '<div class="pulse"></div>' : ''}
                <div class="img-box">
                    <div class="img-src" style="background-image: url('${n.img}')"></div>
                    <div class="badge">${n.campus}</div>
                </div>
                <div class="info">
                    <h2 class="title">${n.title}</h2>
                    <div class="date">${n.date.toLocaleDateString('pt-BR')} às ${n.date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            </a>`).join('');
    }

    fetchAll();
</script>
</body>
</html>
