<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar IF Baiano - Monitor DICOM</title>
    <style>
        :root { 
            --if-verde: #009639; 
            --if-vermelho: #C8102E; 
            --if-preto: #000000;
            --if-branco: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.95);
            --txt-primario: #333333;
            --txt-secundario: #666666;
        }
        
        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(-45deg, #ffffff, #f2f2f2, #f9fff9, #ffffff);
            background-size: 400% 400%;
            animation: meshGradient 25s ease infinite;
            color: var(--txt-primario); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.4;
            min-height: 100vh;
        }
        
        header { 
            background: var(--if-branco); 
            padding: 15px 30px; 
            border-radius: 20px; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            border-bottom: 8px solid var(--if-verde);
            margin-bottom: 25px;
        }
        
        .header-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 15px;
        }
        
        .logo-if { height: 110px; width: auto; }
        h1 { color: var(--if-preto); font-size: 2rem; margin: 0; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        
        .progress-container { max-width: 1200px; margin: 0 auto 15px auto; height: 10px; background: #E0E0E0; border-radius: 20px; overflow: hidden; }
        #bar-fill { width: 100%; height: 100%; background: var(--if-verde); transition: width 1s linear; }
        
        #status-console { 
            font-family: 'Courier New', monospace; font-size: 0.85rem; color: #10b981; 
            background: #1a1a1a; padding: 12px; border-radius: 10px; 
            max-width: 1200px; margin: 0 auto; border: 1px solid #333;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .filters { max-width: 1200px; margin: 20px auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .btn-filter { background: #E0E0E0; border: none; color: var(--txt-primario); padding: 8px 16px; border-radius: 25px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: 0.3s; }
        .btn-filter.active, .btn-filter:hover { background: var(--if-verde); color: var(--if-branco); transform: scale(1.05); }

        #news-container { max-width: 1550px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 30px; padding-bottom: 80px; }
        @media (min-width: 1024px) { #news-container { grid-template-columns: 1fr 1fr; } }

        .card {
            display: flex; background: var(--card-bg); border-radius: 20px; overflow: hidden;
            text-decoration: none; color: inherit; height: 210px; border-left: 12px solid var(--if-verde);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); position: relative;
            backdrop-filter: blur(5px);
        }
        .card:hover { transform: translateY(-10px); border-left-color: var(--if-vermelho); background: var(--if-branco); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }

        .img-box { position: relative; width: 35%; min-width: 220px; height: 100%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-src { width: 100%; height: 100%; background-size: cover; background-position: center; }
        .img-src.fallback { background-size: contain; background-repeat: no-repeat; width: 85%; height: 85%; }
        
        .badge { position: absolute; top: 0; left: 0; background: var(--if-verde); color: var(--if-branco); font-size: 0.8rem; font-weight: 900; padding: 10px 15px; border-bottom-right-radius: 20px; text-transform: uppercase; z-index: 10; }

        .pulse { position: absolute; top: 15px; right: 15px; width: 20px; height: 20px; background: var(--if-vermelho); border-radius: 50%; z-index: 20; animation: pulseEffect 1.5s infinite; }
        @keyframes pulseEffect { 0% { box-shadow: 0 0 0 0 rgba(200, 16, 46, 0.8); } 70% { box-shadow: 0 0 0 20px rgba(200, 16, 46, 0); } 100% { box-shadow: 0 0 0 0 rgba(200, 16, 46, 0); } }

        .info { padding: 25px; display: flex; flex-direction: column; justify-content: center; width: 65%; }
        .title { margin: 0; font-size: 1.45rem; line-height: 1.2; font-weight: 800; color: var(--if-preto); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .date { font-size: 1.05rem; color: var(--txt-secundario); margin-top: 15px; font-weight: 700; text-transform: uppercase; }

        @media (max-width: 700px) { 
            .card { height: auto; flex-direction: column; } .img-box { width: 100%; height: 220px; } .info { width: 100%; padding: 25px; } 
            .header-main { flex-direction: column; gap: 10px; } .logo-if { height: 90px; } h1 { font-size: 1.6rem; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-main">
        <img src="https://github.com/yuriluna85/radar-ifbaiano/blob/main/marca-if-baiano-vertical.png?raw=true" alt="Logo IF Baiano" class="logo-if">
        <h1>Radar de Notícias - DICOM</h1>
    </div>
    <div class="progress-container"><div id="bar-fill"></div></div>
    <div id="status-console">> Conexão Direta Ativada. Sincronizando Giro pelos 15 Campi...</div>
</header>

<div class="filters" id="filters">
    <button id="btn-todos" class="btn-filter active" onclick="filterByCampus('Todos', this)">Todos (Destaques)</button>
</div>

<div id="news-container"></div>

<script>
    const LOGO_VERTICAL = "https://github.com/yuriluna85/radar-ifbaiano/blob/main/marca-if-baiano-vertical.png?raw=true";
    
    const UNIDADES = [
        { id: "Reitoria", url: "https://www.ifbaiano.edu.br/portal/wp-json/wp/v2/posts/" },
        { id: "Alagoinhas", url: "https://www.ifbaiano.edu.br/unidades/alagoinhas/wp-json/wp/v2/posts/" },
        { id: "Lapa", url: "https://www.ifbaiano.edu.br/unidades/lapa/wp-json/wp/v2/posts/" },
        { id: "Catu", url: "https://www.ifbaiano.edu.br/unidades/catu/wp-json/wp/v2/posts/" },
        { id: "Mangabeira", url: "https://www.ifbaiano.edu.br/unidades/gmb/wp-json/wp/v2/posts/" },
        { id: "Guanambi", url: "https://www.ifbaiano.edu.br/unidades/guanambi/wp-json/wp/v2/posts/" },
        { id: "Itaberaba", url: "https://www.ifbaiano.edu.br/unidades/itaberaba/wp-json/wp/v2/posts/" },
        { id: "Itapetinga", url: "https://www.ifbaiano.edu.br/unidades/itapetinga/wp-json/wp/v2/posts/" },
        { id: "Santa Inês", url: "https://www.ifbaiano.edu.br/unidades/santaines/wp-json/wp/v2/posts/" },
        { id: "Bonfim", url: "https://www.ifbaiano.edu.br/unidades/bonfim/wp-json/wp/v2/posts/" },
        { id: "Serrinha", url: "https://www.ifbaiano.edu.br/unidades/serrinha/wp-json/wp/v2/posts/" },
        { id: "Teixeira", url: "https://www.ifbaiano.edu.br/unidades/teixeira/wp-json/wp/v2/posts/" },
        { id: "Uruçuca", url: "https://www.ifbaiano.edu.br/unidades/urucuca/wp-json/wp/v2/posts/" },
        { id: "Valença", url: "https://www.ifbaiano.edu.br/unidades/valenca/wp-json/wp/v2/posts/" },
        { id: "Xique-Xique", url: "https://www.ifbaiano.edu.br/unidades/xique-xique/wp-json/wp/v2/posts/" }
    ];

    let timer = 120;
    let dataStore = [];
    let isInitialLoad = true;
    let currentFilter = 'Todos';
    const consoleLog = document.getElementById('status-console');

    setTimeout(() => { location.reload(); }, 3600000);

    UNIDADES.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'btn-filter'; btn.innerText = u.id;
        btn.onclick = (e) => filterByCampus(u.id, e.target);
        document.getElementById('filters').appendChild(btn);
    });

    setInterval(() => {
        timer--;
        document.getElementById('bar-fill').style.width = (timer / 120 * 100) + "%";
        if (timer <= 0) { timer = 120; giroCompleto(); }
    }, 1000);

    async function giroCompleto() {
        consoleLog.innerText = isInitialLoad ? "> Sincronizando Giro pelos 15 Campi..." : "> Verificando novas publicações...";
        let tempBatch = [];

        for (const unidade of UNIDADES) {
            consoleLog.innerText = `> Requisição Direta: ${unidade.id}...`;
            try {
                // Fetch Direto sem proxy
                const response = await fetch(`${unidade.url}?per_page=5&_t=${Date.now()}`);
                const posts = await response.json();

                if (posts && Array.isArray(posts)) {
                    posts.forEach(post => {
                        const pDate = new Date(post.date);
                        let img = LOGO_VERTICAL;
                        let isFallback = true;
                        const imgMatch = post.content.rendered.match(/src="([^"]+)"/);
                        if (imgMatch) { img = imgMatch[1]; isFallback = false; }

                        tempBatch.push({
                            id: post.id,
                            title: post.title.rendered.replace(/&#8211;/g, '-').replace(/&nbsp;/g, ' ').replace(/&#8220;/g, '"').replace(/&#8221;/g, '"'),
                            link: post.link,
                            date: pDate,
                            campus: unidade.id,
                            img: img,
                            isFallback: isFallback,
                            hot: (Date.now() - pDate.getTime()) < 3600000
                        });
                    });
                }
            } catch (e) { 
                const oldOnes = dataStore.filter(n => n.campus === unidade.id);
                tempBatch = tempBatch.concat(oldOnes);
                consoleLog.innerText = `> ${unidade.id}: Erro de CORS ou Rede. Mantendo cache.`;
            }
            await new Promise(r => setTimeout(r, 200));
        }

        dataStore = tempBatch;
        render(dataStore);
        isInitialLoad = false;
        consoleLog.innerText = `> Monitor Direto Online.`;
    }

    function filterByCampus(id, btn) {
        currentFilter = id;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(dataStore);
    }

    function render(list) {
        const container = document.getElementById('news-container');
        let displayList = [];

        if (currentFilter === 'Todos') {
            const latestMap = new Map();
            list.forEach(item => {
                if (!latestMap.has(item.campus) || item.date > latestMap.get(item.campus).date) {
                    latestMap.set(item.campus, item);
                }
            });
            displayList = Array.from(latestMap.values()).sort((a, b) => b.date - a.date);
        } else {
            displayList = list.filter(n => n.campus === currentFilter).sort((a, b) => b.date - a.date).slice(0, 5);
        }

        if (displayList.length === 0) {
            container.innerHTML = `<p style="text-align:center; padding: 50px; color: var(--if-vermelho);">Aguardando dados... Se persistir, verifique o CORS no servidor.</p>`;
            return;
        }
        
        container.innerHTML = displayList.map(n => `
            <a href="${n.link}" target="_blank" class="card">
                ${n.hot ? '<div class="pulse"></div>' : ''}
                <div class="img-box">
                    <div class="img-src ${n.isFallback ? 'fallback' : ''}" style="background-image: url('${n.img}')"></div>
                    <div class="badge">${n.campus}</div>
                </div>
                <div class="info">
                    <h2 class="title">${n.title}</h2>
                    <div class="date">${n.date.toLocaleDateString('pt-BR')} | ${n.date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            </a>`).join('');
    }

    giroCompleto();
</script>
</body>
</html>
