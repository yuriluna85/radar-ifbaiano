<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar IF Baiano - DICOM</title>
    <style>
        :root { --verde: #32a041; --vermelho: #c8191e; --bg: #0f172a; --card: #1e293b; --txt: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; }
        
        header { text-align: center; margin-bottom: 10px; }
        h1 { color: var(--verde); font-size: 1.6rem; margin: 0; font-weight: 800; text-transform: uppercase; }
        
        .progress-container { width: 100%; height: 6px; background: #334155; margin-top: 15px; border-radius: 10px; overflow: hidden; }
        #bar-fill { width: 100%; height: 100%; background: var(--verde); transition: width 1s linear; }
        
        #status-console { 
            font-family: 'Courier New', monospace; font-size: 0.7rem; color: #10b981; 
            background: #000; padding: 12px; border-radius: 8px; 
            max-width: 850px; margin: 15px auto; border: 1px solid #334155;
            min-height: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .filters { max-width: 950px; margin: 15px auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .btn-filter { 
            background: #334155; border: none; color: #94a3b8; padding: 6px 12px; 
            border-radius: 15px; cursor: pointer; font-size: 0.65rem; font-weight: 700; transition: 0.3s;
        }
        .btn-filter.active, .btn-filter:hover { background: var(--verde); color: #fff; }

        #news-container { max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

        .card {
            display: flex; background: var(--card); border-radius: 12px; overflow: hidden;
            text-decoration: none; color: inherit; height: 130px; border-left: 6px solid var(--verde);
            margin-bottom: -15px; transition: 0.4s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); position: relative; animation: fadeIn 0.6s ease forwards;
        }
        .card:hover { transform: translateY(-10px); z-index: 10; border-left-color: var(--vermelho); background: #334155; }

        .img-box { position: relative; width: 240px; min-width: 240px; height: 100%; background: #000; }
        .img-src { width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.85; }
        .badge { position: absolute; top: 0; left: 0; background: var(--verde); color: #fff; font-size: 0.65rem; font-weight: 900; padding: 5px 12px; border-bottom-right-radius: 12px; text-transform: uppercase; }

        .pulse { position: absolute; top: 12px; right: 12px; width: 12px; height: 12px; background: var(--vermelho); border-radius: 50%; z-index: 20; animation: pulseEffect 1.5s infinite; }
        @keyframes pulseEffect { 0% { box-shadow: 0 0 0 0 rgba(200, 25, 30, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(200, 25, 30, 0); } 100% { box-shadow: 0 0 0 0 rgba(200, 25, 30, 0); } }

        .info { padding: 15px 25px; display: flex; flex-direction: column; justify-content: center; }
        .title { margin: 0; font-size: 1rem; line-height: 1.3; font-weight: 600; color: #fff; }
        .date { font-size: 0.65rem; color: #94a3b8; margin-top: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
        @media (max-width: 700px) { .card { height: auto; flex-direction: column; margin-bottom: 20px; } .img-box { width: 100%; height: 160px; } }
    </style>
</head>
<body>

<header>
    <h1>📡 Radar IF Baiano</h1>
    <div class="progress-container"><div id="bar-fill"></div></div>
    <div id="status-console">> Sistema pronto. Sincronizando via Google Tunnel...</div>
</header>

<div class="filters" id="filters">
    <button class="btn-filter active" onclick="filterByCampus('Todos', this)">Todos</button>
</div>

<div id="news-container">
    <p style="text-align:center; padding: 50px; opacity: 0.5;">Aguardando retorno dos Campi...</p>
</div>

<script>
    const UNIDADES = [
        { id: "Reitoria", url: "https://ifbaiano.edu.br/portal/noticias/feed/" },
        { id: "Alagoinhas", url: "https://ifbaiano.edu.br/portal/campi/alagoinhas/feed/" },
        { id: "Lapa", url: "https://ifbaiano.edu.br/portal/campi/lapa/feed/" },
        { id: "Catu", url: "https://ifbaiano.edu.br/portal/campi/catu/feed/" },
        { id: "Mangabeira", url: "https://ifbaiano.edu.br/portal/campi/mangabeira/feed/" },
        { id: "Guanambi", url: "https://ifbaiano.edu.br/portal/campi/guanambi/feed/" },
        { id: "Itaberaba", url: "https://ifbaiano.edu.br/portal/campi/itaberaba/feed/" },
        { id: "Itapetinga", url: "https://ifbaiano.edu.br/portal/campi/itapetinga/feed/" },
        { id: "Santa Inês", url: "https://ifbaiano.edu.br/portal/campi/santa-ines/feed/" },
        { id: "Bonfim", url: "https://ifbaiano.edu.br/portal/campi/bonfim/feed/" },
        { id: "Serrinha", url: "https://ifbaiano.edu.br/portal/campi/serrinha/feed/" },
        { id: "Teixeira", url: "https://ifbaiano.edu.br/portal/campi/teixeira/feed/" },
        { id: "Uruçuca", url: "https://ifbaiano.edu.br/portal/campi/urucuca/feed/" },
        { id: "Valença", url: "https://ifbaiano.edu.br/portal/campi/valenca/feed/" }
    ];

    let timer = 120;
    let dataStore = [];
    const consoleLog = document.getElementById('status-console');

    // Inicialização de Filtros
    UNIDADES.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'btn-filter'; btn.innerText = u.id;
        btn.onclick = (e) => filterByCampus(u.id, e.target);
        document.getElementById('filters').appendChild(btn);
    });

    setInterval(() => {
        timer--;
        document.getElementById('bar-fill').style.width = (timer / 120 * 100) + "%";
        if (timer <= 0) { timer = 120; giroCompleto(); }
    }, 1000);

    async function fetchViaGoogle(targetUrl) {
        // O "segredo": Proxy do Google Gadgets
        const proxyUrl = `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=3600&url=${encodeURIComponent(targetUrl)}`;
        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) return null;
            return await response.text();
        } catch (e) { return null; }
    }

    async function giroCompleto() {
        consoleLog.innerText = "> Iniciando Varredura via Google Cloud...";
        let tempBatch = [];

        for (const unidade of UNIDADES) {
            consoleLog.innerText = `> Lendo: ${unidade.id}...`;
            
            // Pausa estratégica de 300ms
            await new Promise(r => setTimeout(r, 300));

            const xmlContent = await fetchViaGoogle(unidade.url);
            
            if (xmlContent) {
                try {
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(xmlContent, "text/xml");
                    const item = xml.querySelector("item");

                    if (item) {
                        const pDate = new Date(item.querySelector("pubDate").textContent);
                        const desc = item.querySelector("description")?.textContent || "";
                        const imgMatch = desc.match(/src="([^"]+)"/);

                        tempBatch.push({
                            title: item.querySelector("title").textContent,
                            link: item.querySelector("link").textContent,
                            date: pDate,
                            campus: unidade.id,
                            img: imgMatch ? imgMatch[1] : `https://picsum.photos/seed/${unidade.id}/400/220`,
                            hot: (Date.now() - pDate.getTime()) < 3600000
                        });
                        consoleLog.innerText = `> ${unidade.id}: OK.`;
                    }
                } catch (e) { consoleLog.innerText = `> ${unidade.id}: Erro de XML.`; }
            } else {
                consoleLog.innerText = `> ${unidade.id}: Servidor ocupado.`;
            }
        }

        dataStore = tempBatch.sort((a, b) => b.date - a.date);
        render(dataStore);
        consoleLog.innerText = `> Sucesso! ${dataStore.length}/14 unidades sincronizadas.`;
    }

    function filterByCampus(id, btn) {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(id === 'Todos' ? dataStore : dataStore.filter(n => n.campus === id));
    }

    function render(list) {
        const container = document.getElementById('news-container');
        if (list.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:50px; opacity:0.5;'>O Radar não conseguiu captar notícias agora. <br>Tentando novo giro em instantes...</p>";
            return;
        }
        container.innerHTML = list.map(n => `
            <a href="${n.link}" target="_blank" class="card">
                ${n.hot ? '<div class="pulse"></div>' : ''}
                <div class="img-box">
                    <div class="img-src" style="background-image: url('${n.img}')"></div>
                    <div class="badge">${n.campus}</div>
                </div>
                <div class="info">
                    <h2 class="title">${n.title}</h2>
                    <div class="date">${n.date.toLocaleDateString('pt-BR')} às ${n.date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            </a>`).join('');
    }

    giroCompleto();
</script>
</body>
</html>
